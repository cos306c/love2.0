<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天天开心</title>
    <style>
        /* 设置body和html全屏 */
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
        }

        /* 背景 */
        .video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* 保持比例并覆盖整个容器 */
            z-index: -1; /* 确保在最底层 */
        }

        /* 内容样式 */
        .content {
            position: absolute;
            top: 65%;
            left: 42%;
            transform: translate(-50%, -50%);
            color: rgb(238, 230, 235);
            font-size: 1.1rem;
            font-family: 楷体;
            animation: pulse 1.5s infinite;
            text-align: center;
            z-index: 1; /* 确保内容显示在之上 */
        }
         @keyframes pulse {
            0% {
                transform: scale(1);
                color: #f0284d;
            }
            50% {
                transform: scale(1.3);
                color: #46d3f0;
            }
            100% {
                transform: scale(1);
                color: #ed385a;
            }
        }
    </style>
</head>
<body>

    <!-- 背景 -->
    <video class="video-background" autoplay muted loop>
        <source src="love.mp4" type="video/mp4">
        
        Your browser does not support the video tag.
    </video>

    <!-- 页面内容 -->
    <div class="content"> 
       <!--  <h1>果果<br>永远开心哦<h1> -->
    </div>

</script>
<audio id="music1" loop preload="auto" controls hidden>
    <source src="http://music.163.com/song/media/outer/url?id=1966879563.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>

  <script>
    document.body.addEventListener('click', function() {
      var myAudio = document.getElementById('music1');
      myAudio.play();
    });
  </script>

</body>
</html>
