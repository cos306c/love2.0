<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>致菲菲</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=ZCOOL+QingKe+HuangYou&family=Noto+Serif+SC:wght@300;400&display=swap');

  :root {
    --pink:    #ff7eb3;
    --rose:    #ff4d88;
    --soft:    #ffe0ef;
    --cream:   #fff5f9;
    --deep:    #c2185b;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    width:100vw; height:100vh; overflow:hidden;
    background: radial-gradient(ellipse at 30% 20%, #ffe4f0 0%, #ffc2d9 40%, #ff91bb 100%);
    font-family: 'Noto Serif SC', serif;
  }

  .bg-blob {
    position:fixed; border-radius:50%; filter:blur(60px); opacity:0.45; z-index:0;
    animation: blobMove ease-in-out infinite alternate;
  }
  .blob1 { width:420px;height:420px;background:#ffb3d1;top:-80px;left:-80px;animation-duration:8s; }
  .blob2 { width:350px;height:350px;background:#ff80b5;bottom:-60px;right:-60px;animation-duration:10s;animation-delay:-3s; }
  .blob3 { width:280px;height:280px;background:#ffd6e7;top:40%;left:55%;animation-duration:12s;animation-delay:-5s; }

  @keyframes blobMove {
    from { transform: translate(0,0) scale(1); }
    to   { transform: translate(30px,20px) scale(1.12); }
  }

  canvas { position:fixed; inset:0; z-index:1; pointer-events:none; }

  .content {
    position:fixed; inset:0; z-index:10;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
  }

  .big-heart {
    font-size: clamp(4rem,14vw,7rem);
    line-height:1;
    opacity:0;
    animation: popIn 0.8s cubic-bezier(0.34,1.56,0.64,1) forwards 0.5s;
    filter: drop-shadow(0 8px 24px rgba(255,77,136,0.4));
  }
  @keyframes popIn {
    from { transform:scale(0) rotate(-15deg); opacity:0; }
    to   { transform:scale(1) rotate(0deg);  opacity:1; }
  }

  .name {
    font-family: 'ZCOOL QingKe HuangYou', cursive;
    font-size: clamp(2.8rem,10vw,5.5rem);
    color: #fff;
    text-shadow:
      0 2px 0 rgba(194,24,91,0.25),
      0 4px 20px rgba(255,77,136,0.5),
      0 0 60px rgba(255,150,190,0.3);
    opacity:0;
    transform: translateY(25px);
    animation: slideUp 1s ease forwards 1.1s;
    letter-spacing: 0.1em;
    margin-top: 0.3rem;
  }

  .heart-divider {
    display:flex; align-items:center; gap:8px;
    opacity:0; animation: slideUp 1s ease forwards 1.8s;
    margin: 0.5rem 0;
  }
  .heart-divider .line {
    height:1.5px; width: clamp(50px,12vw,90px);
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7));
    border-radius:2px;
  }
  .heart-divider .line.r { background: linear-gradient(90deg, rgba(255,255,255,0.7), transparent); }
  .heart-divider span { font-size:1.1rem; animation: beat 1.2s ease-in-out infinite; }
  @keyframes beat {
    0%,100%{transform:scale(1)} 50%{transform:scale(1.25)}
  }

  .message {
    font-size: clamp(1.5rem,5vw,2.6rem);
    color: #fff;
    font-weight: 400;
    letter-spacing: 0.35em;
    text-shadow: 0 2px 16px rgba(194,24,91,0.35), 0 0 40px rgba(255,120,170,0.3);
    opacity:0;
    transform: translateY(20px);
    animation: slideUp 1s ease forwards 2.3s;
  }

  .subtitle {
    font-size: clamp(0.7rem,2.5vw,0.95rem);
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.18em;
    margin-top: 0.5rem;
    opacity:0;
    animation: slideUp 1s ease forwards 3s;
  }

  .btn-area {
    margin-top: 1.8rem;
    display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;
    opacity:0; animation: slideUp 1s ease forwards 3.5s;
  }

  .btn {
    padding: 0.6rem 1.6rem;
    border-radius: 999px;
    border: 2px solid rgba(255,255,255,0.8);
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(8px);
    color: #fff;
    font-family: 'Noto Serif SC', serif;
    font-size: clamp(0.85rem,2.5vw,1rem);
    cursor: pointer;
    letter-spacing:0.1em;
    transition: all 0.25s;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover, .btn:active {
    background: rgba(255,255,255,0.38);
    transform: translateY(-2px) scale(1.04);
    box-shadow: 0 8px 24px rgba(194,24,91,0.25);
  }

  .music-indicator {
    position:fixed; top:18px; right:18px; z-index:20;
    display:flex; align-items:center; gap:6px;
    background: rgba(255,255,255,0.25);
    backdrop-filter: blur(10px);
    border-radius:999px;
    padding: 6px 14px 6px 10px;
    font-size:0.8rem; color:#fff;
    cursor:pointer;
    border: 1px solid rgba(255,255,255,0.4);
    transition: background 0.2s;
  }
  .music-indicator:hover { background: rgba(255,255,255,0.38); }
  .bars { display:flex; gap:2px; align-items:flex-end; height:14px; }
  .bar {
    width:3px; background:#fff; border-radius:2px;
    animation: barBounce 0.8s ease-in-out infinite alternate;
  }
  .bar:nth-child(1){height:6px; animation-delay:0s;}
  .bar:nth-child(2){height:12px;animation-delay:0.15s;}
  .bar:nth-child(3){height:8px; animation-delay:0.3s;}
  .bar:nth-child(4){height:14px;animation-delay:0.1s;}
  .bar.paused { animation-play-state:paused; height:4px!important; }

  @keyframes barBounce {
    from{transform:scaleY(0.4)} to{transform:scaleY(1)}
  }
  @keyframes slideUp {
    to { opacity:1; transform:translateY(0); }
  }

  .petal {
    position:fixed; pointer-events:none; z-index:2;
    animation: petalFall linear forwards;
    opacity:0;
  }
  @keyframes petalFall {
    0%  { transform:translateY(-20px) rotate(0deg) translateX(0); opacity:0; }
    10% { opacity:1; }
    90% { opacity:0.6; }
    100%{ transform:translateY(110vh) rotate(var(--r)) translateX(var(--dx)); opacity:0; }
  }

  .click-heart {
    position:fixed; pointer-events:none; z-index:30;
    animation: heartPop 0.8s ease-out forwards;
  }
  @keyframes heartPop {
    0%  { transform:scale(0) translate(0,0); opacity:1; }
    60% { transform:scale(1.4) translate(var(--tx),var(--ty)); opacity:0.9; }
    100%{ transform:scale(0.5) translate(calc(var(--tx)*2),calc(var(--ty)*2 + 30px)); opacity:0; }
  }

  .reply-overlay {
    position:fixed; inset:0; z-index:50;
    background: rgba(255,150,190,0.2);
    backdrop-filter: blur(4px);
    display:none; align-items:center; justify-content:center;
  }
  .reply-overlay.show { display:flex; }
  .reply-box {
    background: rgba(255,255,255,0.95);
    border-radius:24px;
    padding: 2.4rem 2rem;
    text-align:center;
    max-width:300px; width:88%;
    box-shadow: 0 20px 60px rgba(194,24,91,0.2);
    animation: popIn 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .reply-box p {
    font-size:1.4rem; color:var(--deep);
    margin-bottom:1.2rem; line-height:1.8;
    white-space: pre-line;
  }
  .reply-box .close-btn {
    padding:0.5rem 1.8rem;
    background: linear-gradient(135deg,var(--pink),var(--rose));
    color:#fff; border:none; border-radius:999px;
    font-size:1rem; cursor:pointer;
    font-family:'Noto Serif SC',serif;
    transition: transform 0.2s;
  }
  .reply-box .close-btn:hover { transform:scale(1.05); }
</style>
</head>
<body>

<div class="bg-blob blob1"></div>
<div class="bg-blob blob2"></div>
<div class="bg-blob blob3"></div>

<canvas id="bubbleCanvas"></canvas>

<div class="music-indicator" id="musicToggle" onclick="toggleMusic()">
  <span>🎵</span>
  <div class="bars" id="bars">
    <div class="bar paused"></div><div class="bar paused"></div>
    <div class="bar paused"></div><div class="bar paused"></div>
  </div>
</div>

<div class="content">
  <div class="big-heart">💗</div>
  <div class="name">菲菲</div>
  <div class="heart-divider">
    <div class="line"></div>
    <span>🌸</span>
    <div class="line r"></div>
  </div>
  <div class="message">我喜欢你</div>
  <div class="subtitle">— 愿此刻的心跳，让你知道 —</div>
  <div class="btn-area">
    <button class="btn" onclick="showReply('yes')">我也喜欢你 💕</button>
    <button class="btn" onclick="showReply('think')">让我想想 🌸</button>
  </div>
</div>

<div class="reply-overlay" id="replyOverlay">
  <div class="reply-box">
    <p id="replyText"></p>
    <button class="close-btn" onclick="closeReply()">嘿嘿 😊</button>
  </div>
</div>

<script>
// ══ Web Audio 钢琴旋律 ══
let audioCtx = null;
let musicPlaying = false;
let scheduledNodes = [];
let loopTimer = null;

function getCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

const N = {
  C4:261.63,D4:293.66,E4:329.63,F4:349.23,
  G4:392.00,A4:440.00,B4:493.88,
  C5:523.25,D5:587.33,E5:659.25,
  G3:196.00,C3:130.81,F3:174.61,A3:220.00,E3:164.81,
};

// 旋律：小星星 + 简单和声
const melody = [
  {n:'C4',d:0.5},{n:'C4',d:0.5},{n:'G4',d:0.5},{n:'G4',d:0.5},
  {n:'A4',d:0.5},{n:'A4',d:0.5},{n:'G4',d:1.0},
  {n:'F4',d:0.5},{n:'F4',d:0.5},{n:'E4',d:0.5},{n:'E4',d:0.5},
  {n:'D4',d:0.5},{n:'D4',d:0.5},{n:'C4',d:1.0},
  {n:'G4',d:0.5},{n:'G4',d:0.5},{n:'F4',d:0.5},{n:'F4',d:0.5},
  {n:'E4',d:0.5},{n:'E4',d:0.5},{n:'D4',d:1.0},
  {n:'G4',d:0.5},{n:'G4',d:0.5},{n:'F4',d:0.5},{n:'F4',d:0.5},
  {n:'E4',d:0.5},{n:'E4',d:0.5},{n:'D4',d:1.0},
  {n:'C4',d:0.5},{n:'C4',d:0.5},{n:'G4',d:0.5},{n:'G4',d:0.5},
  {n:'A4',d:0.5},{n:'A4',d:0.5},{n:'G4',d:1.0},
  {n:'F4',d:0.5},{n:'F4',d:0.5},{n:'E4',d:0.5},{n:'E4',d:0.5},
  {n:'D4',d:0.5},{n:'D4',d:0.5},{n:'C4',d:2.0},
];

function playNote(ac, freq, t, dur, vol) {
  const osc = ac.createOscillator();
  const gain = ac.createGain();
  osc.type = 'triangle';
  osc.frequency.value = freq;
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.025);
  gain.gain.exponentialRampToValueAtTime(vol * 0.25, t + dur * 0.5);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain);
  gain.connect(ac.destination);
  osc.start(t); osc.stop(t + dur + 0.05);
  scheduledNodes.push(osc);

  // 泛音层
  const osc2 = ac.createOscillator();
  const gain2 = ac.createGain();
  osc2.type = 'sine';
  osc2.frequency.value = freq * 2;
  gain2.gain.setValueAtTime(0, t);
  gain2.gain.linearRampToValueAtTime(vol * 0.06, t + 0.01);
  gain2.gain.exponentialRampToValueAtTime(0.0001, t + dur * 0.25);
  osc2.connect(gain2); gain2.connect(ac.destination);
  osc2.start(t); osc2.stop(t + dur * 0.3);
  scheduledNodes.push(osc2);
}

function playMelody() {
  const ac = getCtx();
  if (ac.state === 'suspended') ac.resume();
  let t = ac.currentTime + 0.15;
  const beat = 60 / 76; // BPM 76

  melody.forEach(({n, d}) => {
    playNote(ac, N[n], t, d * beat * 1.05, 0.16);
    t += d * beat;
  });

  const total = melody.reduce((s,{d})=>s+d,0) * beat * 1000;
  loopTimer = setTimeout(() => { if(musicPlaying) playMelody(); }, total - 300);
}

function stopMusic() {
  clearTimeout(loopTimer);
  scheduledNodes.forEach(n => { try { n.stop(); } catch(e){} });
  scheduledNodes = [];
}

function toggleMusic() {
  musicPlaying = !musicPlaying;
  if (musicPlaying) {
    const ac = getCtx();
    if (ac.state === 'suspended') ac.resume();
    playMelody();
    document.querySelectorAll('.bar').forEach(b => b.classList.remove('paused'));
  } else {
    stopMusic();
    document.querySelectorAll('.bar').forEach(b => b.classList.add('paused'));
  }
}

// 首次触摸自动播放
let started = false;
function tryStart() {
  if (started) return; started = true;
  musicPlaying = true;
  playMelody();
  document.querySelectorAll('.bar').forEach(b => b.classList.remove('paused'));
}
document.addEventListener('touchstart', tryStart, {once:true});
document.addEventListener('mousedown', tryStart, {once:true});


// ══ 气泡画布 ══
const canvas = document.getElementById('bubbleCanvas');
const ctx2 = canvas.getContext('2d');
function resize() { canvas.width=innerWidth; canvas.height=innerHeight; }
resize(); window.addEventListener('resize', resize);

class Bubble {
  constructor(init) {
    this.reset(init);
  }
  reset(init) {
    this.x = Math.random() * canvas.width;
    this.y = init ? Math.random() * canvas.height : canvas.height + 40;
    this.r = Math.random() * 26 + 8;
    this.vy = -(Math.random() * 0.7 + 0.25);
    this.vx = (Math.random() - 0.5) * 0.35;
    this.alpha = Math.random() * 0.32 + 0.08;
    this.phase = Math.random() * Math.PI * 2;
    this.wob = Math.random() * 0.012 + 0.004;
    this.isEmoji = Math.random() < 0.2;
    this.emoji = ['💗','💕','🌸','✨','💖'][Math.floor(Math.random()*5)];
    this.rot = 0;
    this.rotS = (Math.random()-0.5)*0.018;
  }
  update() {
    this.phase += this.wob;
    this.x += this.vx + Math.sin(this.phase) * 0.38;
    this.y += this.vy;
    this.rot += this.rotS;
    if (this.y < -60) this.reset(false);
  }
  draw() {
    ctx2.save();
    ctx2.globalAlpha = this.alpha;
    if (this.isEmoji) {
      ctx2.translate(this.x, this.y);
      ctx2.rotate(this.rot);
      ctx2.font = `${this.r*1.1}px serif`;
      ctx2.textAlign='center'; ctx2.textBaseline='middle';
      ctx2.fillText(this.emoji, 0, 0);
    } else {
      const g = ctx2.createRadialGradient(
        this.x-this.r*0.3, this.y-this.r*0.3, this.r*0.08,
        this.x, this.y, this.r
      );
      g.addColorStop(0,'rgba(255,255,255,0.85)');
      g.addColorStop(0.4,'rgba(255,185,215,0.5)');
      g.addColorStop(1,'rgba(255,100,160,0.05)');
      ctx2.beginPath();
      ctx2.arc(this.x, this.y, this.r, 0, Math.PI*2);
      ctx2.fillStyle = g; ctx2.fill();
      ctx2.beginPath();
      ctx2.arc(this.x-this.r*0.28, this.y-this.r*0.28, this.r*0.2, 0, Math.PI*2);
      ctx2.fillStyle='rgba(255,255,255,0.5)'; ctx2.fill();
      ctx2.strokeStyle='rgba(255,150,190,0.25)';
      ctx2.lineWidth=1; ctx2.stroke();
    }
    ctx2.restore();
  }
}

const bubbles = Array.from({length:32}, (_,i) => new Bubble(true));
function animate() {
  ctx2.clearRect(0,0,canvas.width,canvas.height);
  bubbles.forEach(b=>{b.update();b.draw();});
  requestAnimationFrame(animate);
}
animate();


// ══ 花瓣 ══
const petals = ['🌸','🌺','🌷','💮'];
function spawnPetal() {
  const el = document.createElement('div');
  el.className = 'petal';
  el.textContent = petals[Math.floor(Math.random()*petals.length)];
  const dur = Math.random()*5+6;
  el.style.cssText=`left:${Math.random()*100}%;top:-30px;--dx:${(Math.random()-.5)*160}px;--r:${(Math.random()-.5)*540}deg;animation-duration:${dur}s;font-size:${Math.random()*.8+.7}rem;`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(), dur*1000+500);
}
setInterval(spawnPetal, 750);


// ══ 点击爱心 ══
const cEmojis=['💕','💗','🌸','✨','💖','🌷'];
document.addEventListener('click', e=>{
  if(e.target.closest('.btn')||e.target.closest('.reply-overlay')||e.target.id==='musicToggle') return;
  tryStart();
  for(let i=0;i<6;i++){
    const el=document.createElement('div');
    el.className='click-heart';
    el.textContent=cEmojis[Math.floor(Math.random()*cEmojis.length)];
    const tx=(Math.random()-.5)*100, ty=-(Math.random()*80+20);
    el.style.cssText=`left:${e.clientX-14}px;top:${e.clientY-14}px;--tx:${tx}px;--ty:${ty}px;animation-delay:${i*0.06}s;font-size:${Math.random()*.8+1}rem;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),900);
  }
});


// ══ 回应弹窗 ══
function showReply(type) {
  const texts = {
    yes: '💗 耶！\n我好开心好开心！\n我也好喜欢你呀菲菲 🌸',
    think: '🌷 没关系~\n我会一直在这里等你\n慢慢来 💕',
  };
  document.getElementById('replyText').innerText = texts[type];
  document.getElementById('replyOverlay').classList.add('show');
  for(let i=0;i<6;i++) setTimeout(spawnPetal, i*120);
}
function closeReply() {
  document.getElementById('replyOverlay').classList.remove('show');
}
</script>
</body>
</html>
